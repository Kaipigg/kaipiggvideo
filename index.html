<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公网电视台系统</title>
<style>
  body{margin:0;background:#000;color:#fff;font-family:Arial}
  .tv{width:100vw;height:100vh;position:relative}
  video{width:100%;height:100%;object-fit:contain}
  .channel{position:absolute;top:20px;right:20px;background:rgba(0,0,0,.7);padding:10px 16px;border-radius:8px;font-size:22px;color:#0f9}
  .tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#000;padding:20px 40px;border:2px solid #07f;border-radius:10px;font-size:36px;display:none}
  .admin{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.95);padding:25px;border-radius:10px;display:none;flex-direction:column;gap:12px;width:300px;z-index:999}
  input{padding:10px;background:#222;color:#fff;border:1px solid #555;border-radius:6px}
  button{padding:10px;background:#07f;color:#fff;border:none;border-radius:6px;cursor:pointer}
  .red{background:#f44}
  .green{background:#0a5}
</style>
</head>
<body>

<div class="admin" id="admin">
  <input type="password" id="pwd" placeholder="密码">
  <button onclick="login()">登录</button>
  <button class="green" onclick="start(1)">开播 1 台</button>
  <button class="green" onclick="start(2)">开播 2 台</button>
  <button class="red" onclick="closeAdmin()">关闭</button>
</div>

<div class="tv">
  <video id="v" autoplay muted playsinline></video>
  <div class="channel" id="ch">未开播</div>
  <div class="tip" id="tip"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
<script>
const PASSWORD = "123456";
const ROOM = "tv_room_123"; // 房间号，改了就是新频道
let isAdmin = false;
let peers = {};
let streams = {};
let current = 0;

// 隐藏面板：按 5 次空格打开
let space = 0;
document.addEventListener("keydown", e => {
  if (e.key === " ") {
    space++;
    if (space >= 5) {
      document.getElementById("admin").style.display = "flex";
      space = 0;
    }
  }
  const n = parseInt(e.key);
  if ([1,2].includes(n)) switchTo(n);
});

function closeAdmin() {
  document.getElementById("admin").style.display = "none";
}

function login() {
  if (document.getElementById("pwd").value === PASSWORD) {
    isAdmin = true;
    alert("登录成功");
  }
}

// -------------------------
// 公网核心：WebSocket 中继（免费公共服务器，不存数据）
// -------------------------
const socket = new WebSocket("wss://webrtc-signal.deno.dev");
socket.onopen = () => socket.send(JSON.stringify({join: ROOM}));

// 管理员开播
async function start(num) {
  if (!isAdmin) return;
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: {width:1920,height:1080}, audio:false
    });
    streams[num] = s;
    switchTo(num);
    alert(num + " 台已开播");

    const p = new SimplePeer({
      initiator: true, stream: s,
      iceServers: [
        {urls:"stun:stun.qq.com"},
        {urls:"stun:stun.l.google.com:19302"}
      ]
    });
    p.on("signal", sig => {
      socket.send(JSON.stringify({room:ROOM, from:"host", channel:num, sig}));
    });
    peers[num] = p;
  } catch(e) { alert("失败："+e.message); }
}

// 切换频道
function switchTo(num) {
  current = num;
  if (streams[num]) {
    document.getElementById("v").srcObject = streams[num];
    show("CH-" + num);
    return;
  }
  if (!isAdmin) {
    show("正在连接 " + num + " 台...");
    socket.send(JSON.stringify({req: true, room:ROOM, channel:num}));
  }
}

// 观众接收流
socket.onmessage = e => {
  const d = JSON.parse(e.data);
  if (d.channel !== current || isAdmin) return;

  if (!peers[d.channel]) {
    const p = new SimplePeer({
      initiator: false,
      iceServers: [
        {urls:"stun:stun.qq.com"},
        {urls:"stun:stun.l.google.com:19302"}
      ]
    });
    p.on("signal", sig => {
      socket.send(JSON.stringify({room:ROOM, to:"host", channel:d.channel, sig}));
    });
    p.on("stream", s => {
      document.getElementById("v").srcObject = s;
      show("CH-" + d.channel);
    });
    peers[d.channel] = p;
  }
  peers[d.channel].signal(d.sig);
};

function show(text) {
  const t = document.getElementById("tip");
  const ch = document.getElementById("ch");
  t.textContent = text;
  ch.textContent = text.includes("CH") ? text : "连接中...";
  t.style.display = "block";
  setTimeout(()=>t.style.display="none", 1400);
}

window.onload = () => switchTo(1);
</script>
</body>
</html>
